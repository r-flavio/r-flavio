<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1665 381" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="imageclip">
      <rect x="300" y="10" width="1065" height="361" />
    </clipPath>
  </defs>
  
  <!-- Fondo para los bordes -->
  <rect width="100%" height="100%" fill="#121b0c"/>
  
  <!-- Imagen con clip path -->
  <image xlink:href="https://raw.githubusercontent.com/r-flavio/r-flavio/master/lauren_banner_00065047.jpg" x="300" y="10" width="1065" height="361" clip-path="url(#imageclip)"/>
  
  <!-- Bordes -->
  <rect x="0" y="0" width="100%" height="100%" fill="none" stroke="black" stroke-width="20"/>
  
  <!-- Líneas decorativas para los bordes laterales -->
  <line x1="300" y1="0" x2="300" y2="381" stroke="black" stroke-width="2"/>
  <line x1="1365" y1="0" x2="1365" y2="381" stroke="black" stroke-width="2"/>
</svg>